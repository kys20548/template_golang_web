# CI：push / PR 時跑 build、vet、test，再驗證 docker image 蓋得起來。
# 測試全部用 mock（db/mock、cache/mock），不需要起 PostgreSQL / Redis service。
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v -cover ./...

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t template_golang_web:ci .
