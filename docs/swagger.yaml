basePath: /
definitions:
  api.AuthUser:
    properties:
      permissions:
        items:
          type: string
        type: array
      user_id:
        type: integer
      username:
        type: string
    type: object
  api.PageResult:
    properties:
      list: {}
      pageNum:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  api.Response:
    properties:
      code:
        $ref: '#/definitions/errcode.Code'
      data: {}
      msg:
        type: string
    type: object
  api.adminUserResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  api.adminUserWithRolesResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: integer
      roles:
        items:
          $ref: '#/definitions/api.roleBrief'
        type: array
      username:
        type: string
    type: object
  api.changePasswordRequest:
    properties:
      new_password:
        minLength: 6
        type: string
      old_password:
        minLength: 6
        type: string
    required:
    - new_password
    - old_password
    type: object
  api.createAdminUserRequest:
    properties:
      password:
        minLength: 6
        type: string
      role_ids:
        items:
          type: integer
        type: array
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.createUserRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  api.createUserResponse:
    properties:
      user:
        $ref: '#/definitions/api.userResponse'
      wallet:
        $ref: '#/definitions/db.Wallet'
    type: object
  api.loginRequest:
    properties:
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  api.loginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/api.adminUserResponse'
    type: object
  api.operationLogResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      method:
        type: string
      path:
        type: string
      request_body:
        type: string
      request_id:
        type: string
      status_code:
        type: integer
      user_id:
        type: integer
      username:
        type: string
    type: object
  api.roleBrief:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  api.roleResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          type: string
        type: array
    type: object
  api.updateAdminUserRolesRequest:
    properties:
      role_ids:
        items:
          type: integer
        type: array
    type: object
  api.userResponse:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      id:
        type: integer
      username:
        type: string
    type: object
  db.ListWalletsRow:
    properties:
      balance:
        type: integer
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      user_id:
        type: integer
      username:
        type: string
    type: object
  db.Wallet:
    properties:
      balance:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      user_id:
        type: integer
    type: object
  errcode.Code:
    enum:
    - 0
    - 10001
    - 10002
    - 10003
    - 10004
    - 10005
    - 10006
    - 10007
    - 20001
    - 20002
    - 20003
    - 20004
    - 20005
    type: integer
    x-enum-varnames:
    - Success
    - ErrInternal
    - ErrInvalidParams
    - ErrUnauthorized
    - ErrNotFound
    - ErrTimeout
    - ErrNotReady
    - ErrForbidden
    - ErrUserNotFound
    - ErrUserExists
    - ErrWrongCredentials
    - ErrTooManyLoginFails
    - ErrCannotDeleteSelf
host: localhost:8080
info:
  contact: {}
  description: Golang Web 專案模板 API 文件。所有回應皆為統一格式 {code, msg, data}。
  title: template_golang_web API
  version: "1.0"
paths:
  /admin-users:
    get:
      parameters:
      - description: 頁碼（從 1 開始）
        in: query
        name: pageNum
        required: true
        type: integer
      - description: 每頁筆數（5-50）
        in: query
        name: pageSize
        required: true
        type: integer
      - description: 是否包含已刪除者
        in: query
        name: includeDeleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/api.PageResult'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/api.adminUserWithRolesResponse'
                        type: array
                    type: object
              type: object
      security:
      - TokenAuth: []
      summary: 後台使用者列表（含角色）
      tags:
      - admin-user
    post:
      consumes:
      - application/json
      parameters:
      - description: 帳號、密碼與角色
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createAdminUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.adminUserResponse'
              type: object
      security:
      - TokenAuth: []
      summary: 建立後台使用者
      tags:
      - admin-user
  /admin-users/{id}:
    delete:
      parameters:
      - description: 後台使用者 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "400":
          description: 不能刪除自己
          schema:
            $ref: '#/definitions/api.Response'
        "404":
          description: 使用者不存在或已刪除
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 刪除後台使用者（軟刪除，session 立即失效）
      tags:
      - admin-user
  /admin-users/{id}/restore:
    put:
      parameters:
      - description: 後台使用者 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "404":
          description: 使用者不存在或未被刪除
          schema:
            $ref: '#/definitions/api.Response'
        "409":
          description: 帳號名已被重新建立
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 還原後台使用者
      tags:
      - admin-user
  /admin-users/{id}/roles:
    put:
      consumes:
      - application/json
      parameters:
      - description: 後台使用者 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 角色 ID 清單（空陣列 = 清空角色）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.updateAdminUserRolesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 指派後台使用者角色（整組取代）
      tags:
      - admin-user
  /healthz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: 健康檢查（liveness）
      tags:
      - system
  /login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 帳號密碼
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.loginResponse'
              type: object
      summary: 登入
      tags:
      - auth
  /logout:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 登出
      tags:
      - auth
  /me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.AuthUser'
              type: object
      security:
      - TokenAuth: []
      summary: 取得登入者資訊
      tags:
      - auth
  /me/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: 舊密碼與新密碼
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.changePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "400":
          description: 舊密碼錯誤或參數不合法
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 修改密碼（成功後目前 token 失效，需重新登入）
      tags:
      - auth
  /operation-logs:
    get:
      parameters:
      - description: 頁碼（從 1 開始）
        in: query
        name: pageNum
        required: true
        type: integer
      - description: 每頁筆數（5-50）
        in: query
        name: pageSize
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/api.PageResult'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/api.operationLogResponse'
                        type: array
                    type: object
              type: object
      security:
      - TokenAuth: []
      summary: 操作日誌列表
      tags:
      - system
  /readyz:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  type: string
              type: object
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/api.Response'
      summary: Readiness 檢查（含 DB/Redis 連線）
      tags:
      - system
  /roles:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/api.roleResponse'
                  type: array
              type: object
      security:
      - TokenAuth: []
      summary: 角色列表（含權限）
      tags:
      - admin-user
  /users:
    get:
      parameters:
      - description: 頁碼（從 1 開始）
        in: query
        name: pageNum
        required: true
        type: integer
      - description: 每頁筆數（5-50）
        in: query
        name: pageSize
        required: true
        type: integer
      - description: 是否包含已刪除者
        in: query
        name: includeDeleted
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/api.PageResult'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/api.userResponse'
                        type: array
                    type: object
              type: object
      security:
      - TokenAuth: []
      summary: 使用者列表
      tags:
      - user
    post:
      consumes:
      - application/json
      parameters:
      - description: 使用者資料
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.createUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.createUserResponse'
              type: object
      summary: 建立使用者
      tags:
      - user
  /users/{id}:
    delete:
      parameters:
      - description: 使用者 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "404":
          description: 使用者不存在或已刪除
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 刪除前台使用者（軟刪除）
      tags:
      - user
    get:
      parameters:
      - description: 使用者 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  $ref: '#/definitions/api.userResponse'
              type: object
      security:
      - TokenAuth: []
      summary: 查詢使用者
      tags:
      - user
  /users/{id}/restore:
    put:
      parameters:
      - description: 使用者 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.Response'
        "404":
          description: 使用者不存在或未被刪除
          schema:
            $ref: '#/definitions/api.Response'
        "409":
          description: 帳號名或 email 已被重新註冊
          schema:
            $ref: '#/definitions/api.Response'
      security:
      - TokenAuth: []
      summary: 還原前台使用者
      tags:
      - user
  /wallets:
    get:
      parameters:
      - description: 頁碼（從 1 開始）
        in: query
        name: pageNum
        required: true
        type: integer
      - description: 每頁筆數（5-50）
        in: query
        name: pageSize
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/api.Response'
            - properties:
                data:
                  allOf:
                  - $ref: '#/definitions/api.PageResult'
                  - properties:
                      list:
                        items:
                          $ref: '#/definitions/db.ListWalletsRow'
                        type: array
                    type: object
              type: object
      security:
      - TokenAuth: []
      summary: 錢包列表（前台 user）
      tags:
      - wallet
securityDefinitions:
  TokenAuth:
    description: 登入後取得的 token，需驗證的 API 都要在 header 帶上
    in: header
    name: token
    type: apiKey
swagger: "2.0"
